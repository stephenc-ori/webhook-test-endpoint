version: "2"

linters:
  settings:
    errcheck:
      # Writes to an http.ResponseWriter and closes of response bodies have
      # no useful error handling; failures surface as broken connections.
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.WriteString
        - (io.ReadCloser).Close
